name: 🔱 TITANIUM FACTORY - Unified Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "24"

jobs:
  entropy-check:
    name: 🔬 Entropy Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: buildborgbot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: buildborgbot/package-lock.json
      - run: npm ci
      - name: 🧹 Check for merge conflict markers
        run: |
          set -euo pipefail
          if git grep -E "^<<<<<<<|^=======|^>>>>>>>" -- . ':(exclude)node_modules'; then
            echo "❌ Merge conflict markers found in source code!"
            exit 1
          fi
      - name: 📝 Lint (Zero Any Tolerance)
        run: npx biome check .
      - name: 📐 Type Check
        run: npx tsc --noEmit
      - name: 🧪 Tests
        run: npm test
      - name: 🔐 Security Audit (Production Only)
        run: npm audit --audit-level=high --omit=dev
      - name: 📓 Validate D1 Journal
        run: npx tsx scripts/validate-journal.ts
      - name: 📐 Config Matrix Validation
        run: npx tsx scripts/validate-config-matrix.ts

  deploy-staging:
    name: 🧪 Deploy Factory (Staging)
    runs-on: ubuntu-latest
    needs: entropy-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    defaults:
      run:
        working-directory: buildborgbot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: buildborgbot/package-lock.json
      - run: npm ci

      - name: 🔐 Validate Factory Secrets
        run: |
          MISSING=0
          FACTORY_SECRETS=(
            "TELEGRAM_BOT_TOKEN"
            "TITANIUM_API_SECRET"
            "GEMINI_API_KEY"
            "CLOUDFLARE_ACCOUNT_ID"
            "CLOUDFLARE_API_TOKEN"
          )
          for secret in "${FACTORY_SECRETS[@]}"; do
            if [ -z "${!secret}" ]; then
              echo "::error::Missing FACTORY secret: $secret"
              MISSING=1
            fi
          done
          if [ -z "${{ vars.WORKER_URL }}" ]; then
            echo "::error::Missing WORKER_URL var"
            MISSING=1
          fi
          if [ $MISSING -eq 1 ]; then
            exit 1
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TITANIUM_API_SECRET: ${{ secrets.TITANIUM_API_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: 🔐 Sync Factory Secrets to Worker
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: |
            echo "${{ secrets.GEMINI_API_KEY }}" | npx wrangler secret put GEMINI_API_KEY
            echo "${{ secrets.TITANIUM_API_SECRET }}" | npx wrangler secret put TITANIUM_API_SECRET
            echo "${{ secrets.TELEGRAM_BOT_TOKEN }}" | npx wrangler secret put TELEGRAM_BOT_TOKEN
            if [ -n "${{ secrets.ADMIN_TELEGRAM_IDS }}" ]; then
              echo "${{ secrets.ADMIN_TELEGRAM_IDS }}" | npx wrangler secret put ADMIN_TELEGRAM_IDS
            fi
          workingDirectory: buildborgbot

      - name: 🗄️ Apply D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: d1 migrations apply bot_factory_db --remote
          workingDirectory: buildborgbot

      - name: 🚀 Deploy Factory Worker
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: deploy
          workingDirectory: buildborgbot

      - name: 🧪 Smoke Tests
        run: |
          echo "Running smoke tests against ${{ vars.WORKER_URL }}..."
          curl -fsS "${{ vars.WORKER_URL }}/api/health" | grep -q '"status":"ok"'
          echo "✅ Smoke tests passed"

  deploy-prod:
    name: 🚀 Deploy Factory (Production)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    defaults:
      run:
        working-directory: buildborgbot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: buildborgbot/package-lock.json
      - run: npm ci

      - name: 🗄️ Apply D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: d1 migrations apply bot_factory_db --remote
          workingDirectory: buildborgbot

      - name: 🚀 Deploy Factory Worker
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: deploy
          workingDirectory: buildborgbot

      - name: 🔗 Sync BotFather Webhook
        env:
          WORKER_URL: ${{ vars.WORKER_URL }}
          TITANIUM_API_SECRET: ${{ secrets.TITANIUM_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: npx tsx scripts/setup-botfather.ts
