<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración BotFather 2.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module">
        import { html, render } from 'https://unpkg.com/lit-html?module';

        const root = document.getElementById('root');
        const tg = window.Telegram.WebApp;

        function App(state) {
            return html`
                <div class="container">
                    <h1>Configuración de ${state.botName}</h1>
                    <p>Tipo: <strong>${state.botKind}</strong></p>

                    <form @submit=${handleSubmit}>
                        <div class="field">
                            <label>Nombre del Negocio</label>
                            <input type="text" name="name" .value=${state.config.business_identity?.name || ''}>
                        </div>

                        <div class="field">
                            <label>Mensaje de Bienvenida</label>
                            <textarea name="welcome">${state.config.business_identity?.welcome_message || ''}</textarea>
                        </div>

                        <h2>Pasos del Agendado</h2>
                        ${state.config.steps?.map((step, i) => html`
                            <div class="step-card">
                                <h3>Paso ${i + 1}: ${step.label}</h3>
                                <input type="text" value="${step.prompt}">
                            </div>
                        `)}

                        <button type="submit">Guardar Cambios</button>
                    </form>
                </div>
            `;
        }

        async function handleSubmit(e) {
            e.preventDefault();
            tg.showConfirm("¿Deseas guardar los cambios?", (ok) => {
                if (ok) tg.close();
            });
        }

        const initialState = {
            botName: "Cargando...",
            botKind: "agendado",
            config: {}
        };

        render(App(initialState), root);
        tg.ready();
        tg.expand();
    </script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .step-card { background: var(--tg-theme-secondary-bg-color); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
