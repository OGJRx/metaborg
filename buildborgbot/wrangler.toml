name = "fabricaborgbots"
main = "src/index.ts"
compatibility_date = "2024-01-01"

preview_urls = false

[vars]
AI_MODEL_NAME = "gemini-1.5-flash"

[[d1_databases]]
binding = "DB"
database_name = "bot_factory_db"
database_id = "61a5d89a-19d2-4851-9f5b-3f088b729d0c"

[observability]
enabled = true
head_sampling_rate = 0.01

[observability.logs]
enabled = true
head_sampling_rate = 0.01
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 0.01
