name: Deploy Bot Factory

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npx biome check .
      - name: Type Check
        run: npx tsc --noEmit
      - name: Run Tests
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then echo "::error::TELEGRAM_BOT_TOKEN is empty"; exit 1; fi
          if [ -z "${{ secrets.TITANIUM_API_SECRET }}" ]; then echo "::error::TITANIUM_API_SECRET is empty"; exit 1; fi
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then echo "::error::GEMINI_API_KEY is empty"; exit 1; fi
          if [ -z "${{ secrets.MIGRATION_KEY }}" ]; then echo "::error::MIGRATION_KEY is empty"; exit 1; fi
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then echo "::error::CLOUDFLARE_API_TOKEN is empty"; exit 1; fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then echo "::error::CLOUDFLARE_ACCOUNT_ID is empty"; exit 1; fi
          if [ -z "${{ vars.WORKER_URL }}" ]; then echo "::error::WORKER_URL is empty"; exit 1; fi
      - name: Set Cloudflare Secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.GEMINI_API_KEY }}" | npx wrangler secret put GEMINI_API_KEY
          echo "${{ secrets.TITANIUM_API_SECRET }}" | npx wrangler secret put TITANIUM_API_SECRET
          echo "${{ secrets.MIGRATION_KEY }}" | npx wrangler secret put MIGRATION_KEY
          echo "${{ secrets.TELEGRAM_BOT_TOKEN }}" | npx wrangler secret put TELEGRAM_BOT_TOKEN
          echo "${{ secrets.ADMIN_TELEGRAM_IDS }}" | npx wrangler secret put ADMIN_TELEGRAM_IDS
      - name: Apply D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 migrations apply bot_factory_db --remote
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy

      - name: Sync BotFather Webhook
        env:
          WORKER_URL: ${{ vars.WORKER_URL }}
          TITANIUM_API_SECRET: ${{ secrets.TITANIUM_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: npx tsx scripts/setup-botfather.ts

      # Future: Sync tenant bot webhooks
      # - name: Sync Tenant Webhooks
      #   run: ... (requires refactor of sync-webhooks.ts to use D1 instead of env vars)
